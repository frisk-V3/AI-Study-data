name: frisk-v3-AutoCommit-Loop
on:
  push:
    branches:
      - main  # メインブランチにコミット（プッシュ）したら即起動
  repository_dispatch:
    types: [restart_loop] # 休憩後の自動再起動用
  workflow_dispatch: # 手動ボタンも一応残しておく

jobs:
  train-cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout frisk-V3 Core
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      # 20分間の全力学習
      - name: Run 20-Minute Hard Training
        run: python src/train_engine.py

      # 学習データをプッシュ（[skip ci]を入れて無限ループの衝突を防ぐ）
      - name: Sync Learned Data
        run: |
          git config --local user.email "yuniaochaoyang@gmail.com"
          git config --local user.name "frisk-V3"
          git add data/*.json
          # [skip ci] を入れることで、このプッシュ自体でActionが再起動するのを防ぐ
          git commit -m "frisk-V3 Brain Update: $(date +'%H:%M') [skip ci]" || exit 0
          git push

      # 1時間の休憩 ＋ 再起動
      - name: 1 Hour Interval and Auto-Restart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "サイクル完了。1時間休憩します。"
          sleep 3600
          curl -X POST -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com{{ github.repository }}/dispatches \
          -d '{"event_type": "restart_loop"}'
