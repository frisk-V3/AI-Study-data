name: frisk-v3-HighPerformance-Loop
on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_loop]

jobs:
  train-cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout frisk-V3 Core
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      # 20分間、全力でWikipediaからデータを抜いてJSON化
      - name: Run 20-Minute Hard Training
        run: python src/train_engine.py

      # 学習データを即プッシュ
      - name: Sync Learned Data
        run: |
          git config --local user.email "yuniaochaoyang@gmail.com"
          git config --local user.name "frisk-V3"
          git add data/*.json
          git commit -m "frisk-V3 Brain Update: $(date +'%H:%M')" || exit 0
          git push

      # 1時間のインターバル（サーバーを休ませつつ次を予約）
      - name: 1 Hour Interval and Auto-Restart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "20分の本気学習完了。1時間休憩して再起動します。"
          sleep 3600
          curl -X POST -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com{{ github.repository }}/dispatches \
          -d '{"event_type": "restart_loop"}'
